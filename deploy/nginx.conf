# /etc/nginx/sites-available/gamejam
# NGINX Configuration for Karadeniz Game Jam 2026

server {
    listen 80;
    listen [::]:80;
    server_name gamejam2026.com www.gamejam2026.com;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gamejam2026.com www.gamejam2026.com;

    # SSL Certificates (provisioned via Certbot)
    ssl_certificate /etc/letsencrypt/live/gamejam2026.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gamejam2026.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Modern TLS standards
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security Headers (Supplements Helmet.js)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Serve static files efficiently directly through NGINX, bypassing Node.js
    location /css/ {
        # Path to the mounted public dir or absolute root if uncontainerized
        # Using proxy_pass for Dockerized setup instead for simplicity, but 
        # normally you alias /var/www/gamejam/public/css/;
        proxy_pass http://127.0.0.1:3000;
        expires max;
        access_log off;
    }

    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        expires max;
        access_log off;
    }

    location /js/ {
        proxy_pass http://127.0.0.1:3000;
        expires max;
        access_log off;
    }

    # Proxy dynamic requests to the Express.js container
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
