version: '3.8'

services:
  app:
    build:
      context: .
      target: production
    container_name: kgj_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Redis Connection
      - REDIS_URL=redis://cache:6379
      # PostgreSQL Connection
      - PG_HOST=db
      - PG_PORT=5432
      - PG_USER=kgj_admin
      - PG_PASSWORD=kgj_secure_pass_2026
      - PG_DATABASE=gamejam
      # Session & Secrets
      - SESSION_SECRET=${SESSION_SECRET:-changeme_prod_secret}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-supersecret123}
      # Cookie security — set to true only after SSL/HTTPS is live
      - COOKIE_SECURE=false
      # OAuth Variables (Passed from Host .env)
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - kgj_network
    restart: always

  db:
    image: postgres:16-alpine
    container_name: kgj_postgres
    environment:
      POSTGRES_USER: kgj_admin
      POSTGRES_PASSWORD: kgj_secure_pass_2026
      POSTGRES_DB: gamejam
    ports:
      # Expose only to localhost for debugging, use networks for app
      - "127.0.0.1:5432:5432"
    volumes:
      # Persistent Data Mount
      - pgdata:/var/lib/postgresql/data
      # Initial SQL Scripts (runs automatically on empty DB)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kgj_admin -d gamejam"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kgj_network
    restart: always

  cache:
    image: redis:7-alpine
    container_name: kgj_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kgj_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: kgj_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - app
    networks:
      - kgj_network
    restart: always

  certbot:
    image: certbot/certbot
    container_name: kgj_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --force-renewal --email admin@karadenizgamejam.com -d karadenizgamejam.com -d www.karadenizgamejam.com --agree-tos

networks:
  kgj_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  certbot_conf:
  certbot_www:
